name: Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4

      - name: Install mojo-pkg
        run: |
          mkdir -p "$HOME/.mojo/bin"
          curl -fsSL https://github.com/Mosaad-M/mojo-pkg/releases/latest/download/mojo-pkg-linux-64.tar.gz \
            | tar xz -C "$HOME/.mojo/bin"
          echo "$HOME/.mojo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          LD_LIBRARY_PATH="$(pwd)/.pixi/envs/default/lib" \
            $HOME/.mojo/bin/mojo-pkg install

      - name: Run tests
        run: pixi run test-ci

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4

      - name: Install mojo-pkg
        run: |
          mkdir -p "$HOME/.mojo/bin"
          curl -fsSL https://github.com/Mosaad-M/mojo-pkg/releases/latest/download/mojo-pkg-osx-arm64.tar.gz \
            | tar xz -C "$HOME/.mojo/bin"
          echo "$HOME/.mojo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          DYLD_LIBRARY_PATH="$(pwd)/.pixi/envs/default/lib" \
            $HOME/.mojo/bin/mojo-pkg install

      - name: Run tests
        run: pixi run test-ci
