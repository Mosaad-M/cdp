[workspace]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "cdp"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
pkg-install = "~/.mojo/bin/mojo-pkg install"
run = { cmd = "bash build_and_run.sh main.mojo", depends-on = ["pkg-install"] }
test = { cmd = "bash build_and_run.sh test_cdp.mojo", depends-on = ["pkg-install"] }
test-ci = "bash build_and_run.sh test_cdp.mojo"
format = "mblack cdp.mojo main.mojo test_cdp.mojo"

[dependencies]
mojo = ">=0.26.2"
