[workspace]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "cdp"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "bash build_and_run.sh main.mojo"
test = "bash build_and_run.sh test_cdp.mojo"
format = "mblack cdp.mojo main.mojo test_cdp.mojo"

[dependencies]
mojo = ">=0.26.2"
